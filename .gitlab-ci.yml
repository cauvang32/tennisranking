stages:
  - setup
  - security
  - test
  - build
  - deploy

variables:
  DEPLOY_PATH: /home/vps/tennisranking
  GIT_ORIGIN: https://git.quocanh.me/cauvang32/tennisranking
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.cache/npm"
  # Note: NODE_ENV=production is set only at deploy time, not globally
  # This ensures devDependencies (like vite) are installed during build

# =========================
# DEFAULT - DOCKER RUNNER
# =========================
default:
  image: node:20-slim
  tags:
    - docker
  before_script:
    - set -e
  cache:
    key: npm-cache-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/npm/

# =========================
# SETUP
# =========================
setup-dependencies:
  stage: setup
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "📦 Installing Node.js dependencies..."
    - node --version
    - npm --version
    - npm ci --prefer-offline --cache "$NPM_CACHE_DIR"
  cache:
    key: npm-cache-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/npm/
    policy: pull-push
  artifacts:
    paths:
      - package-lock.json
    expire_in: 1 hour

# =========================
# SECURITY
# =========================
npm-audit:
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "🔍 Running npm audit..."
    - npm audit --json --audit-level=moderate > npm-audit-report.json || true
  artifacts:
    paths:
      - npm-audit-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

eslint:
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "📋 Running ESLint..."
    - npx eslint src/ lib/ middleware/ routes/ utils/ --ext .js,.ts --format json --output-file eslint-report.json || true
  artifacts:
    paths:
      - eslint-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

semgrep:
  image: returntocorp/semgrep:latest
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "🔎 Running Semgrep..."
    - semgrep --config=p/security-audit --json --output semgrep-report.json || true
  artifacts:
    paths:
      - semgrep-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

detect-secrets:
  image: python:3.11-slim
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apt-get update && apt-get install -y python3-pip git
    - pip install detect-secrets
  script:
    - echo "🔐 Running detect-secrets..."
    - if [ -f .secrets.baseline ]; then detect-secrets audit .secrets.baseline || true; else detect-secrets scan --all-files > detect-secrets-scan.json || true; fi
  artifacts:
    paths:
      - detect-secrets-scan.json
      - .secrets.baseline
    expire_in: 30 days
    when: always
  allow_failure: true

snyk:
  stage: security
  image: node:20-slim
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - npm install -g snyk@latest || true
  script: |
    echo "🔎 Snyk job starting..."
    echo "SNYK_TOKEN length: ${#SNYK_TOKEN}"

    # basic network tools for debugging inside the CI container
    apt-get update -y && apt-get install -y curl dnsutils || true
    echo "-> curl (ipv4):"; curl -4 -I -m 10 https://api.snyk.io || true
    echo "-> curl (ipv6):"; curl -6 -I -m 10 https://api.snyk.io || true
    nslookup api.snyk.io || true

    # if no token, skip safely and produce an artifact so upload won't fail
    if [ -z "$SNYK_TOKEN" ]; then
      echo "⚠️ SNYK_TOKEN not set — skipping snyk scan"
      echo '{}' > snyk-report.json
      exit 0
    fi

    # verbose logging for debug (remove when stable)
    export SNYK_LOG_LEVEL=trace
    # prefer IPv4 (helps if IPv6 routing is flaky)
    export NODE_OPTIONS="--dns-result-order=ipv4first"

    # try snyk test with pruning + retries (prune reduces payload size)
    for i in 1 2 3; do
      echo "snyk attempt #$i ..."
      snyk test --prune-repeated-subdependencies -d --json > snyk-report.json && break || true
      echo "snyk attempt #$i failed, retrying in 5s..."
      sleep 5
    done

    # fallback: if test still failed, try monitor (sometimes smaller/safer) and keep a valid artifact
    if [ ! -s snyk-report.json ]; then
      echo "⚠️ snyk test failed repeatedly — attempting snyk monitor (prune) as fallback"
      snyk monitor --prune-repeated-subdependencies --json > snyk-monitor.json || true
      echo '{}' > snyk-report.json
    fi
  artifacts:
    paths:
      - snyk-report.json
      - snyk-monitor.json
    expire_in: 30 days
    when: always
  allow_failure: true

# =========================
# TEST & BUILD
# =========================
tests:
  stage: test
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "🧪 Running tests..."
    - npm test || echo "⚠️ Tests failed or not configured"
  allow_failure: true

build:
  stage: build
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "🔨 Building app..."
    - node --version
    - npm --version
    - npm ci --prefer-offline --cache "$NPM_CACHE_DIR" --include=dev
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
    when: on_success

# =========================
# 🚀 DEPLOY TO SERVER
# =========================
deploy:
  stage: deploy
  tags:
    - ubuntu-latest-shell
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  needs:
    - job: build
  
  before_script:
    - set -e
    - echo "🚀 Starting deployment to production..."
    - node --version || echo "Node.js not in PATH, using system version"
    - npm --version || echo "npm not in PATH, using system version"
    - pm2 --version || echo "PM2 not found, will install if needed"

  script:
    - cd "$DEPLOY_PATH"
    - echo "📂 Changed to deployment directory - $DEPLOY_PATH"
    - echo "� Configuring git safe directory..."
    - git config --global --add safe.directory "$DEPLOY_PATH"
    - echo "�🔄 Setting git origin and pulling latest changes..."
    - git remote set-url origin "$GIT_ORIGIN" || git remote add origin "$GIT_ORIGIN"
    - git fetch origin
    - git reset --hard origin/$CI_DEFAULT_BRANCH
    - echo "✅ Git pull completed"
    - echo "⏹️ Stopping PM2 process..."
    - pm2 stop tennis || echo "Process tennis was not running"
    - echo "📦 Installing dependencies..."
    - npm install --production=false
    - echo "🔨 Building application..."
    - npm run build
    - echo "▶️ Starting PM2 process..."
    - pm2 delete tennis || true
    - pm2 start server.js --name tennis --env production
    - pm2 save
    - echo "📊 PM2 Status:"
    - pm2 status
    - echo "✅ Deployment completed successfully!"

  after_script:
    - echo "🏁 Deployment script finished"

  environment:
    name: production
    url: https://hungsanity.com/tennis

# =========================
# 🔄 ROLLBACK (Manual trigger)
# =========================
rollback:
  stage: deploy
  tags:
    - ubuntu-latest-shell
  rules:
    - when: manual
      allow_failure: true
  allow_failure:
    exit_codes:
      - 99
  
  script:
    - cd "$DEPLOY_PATH"
    - echo "⏪ Rolling back to previous commit..."
    - echo "🔧 Configuring git safe directory..."
    - git config --global --add safe.directory "$DEPLOY_PATH"
    - git reset --hard HEAD~1
    - pm2 stop tennis || true
    - npm install --production=false
    - npm run build
    - pm2 delete tennis || true
    - pm2 start server.js --name tennis --env production
    - pm2 save
    - echo "⚠️ Rollback completed - Pipeline marked as warning"
    - exit 99

  environment:
    name: production
    action: stop
