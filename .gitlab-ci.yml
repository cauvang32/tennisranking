include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml


workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never
  
stages:
  - setup
  - security
  - test
  - build
  - deploy

variables:
  DEPLOY_PATH: /home/vps/tennisranking
  GIT_ORIGIN: https://git.quocanh.me/cauvang32/tennisranking
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.cache/npm"
  # Note: NODE_ENV=production is set only at deploy time, not globally
  # This ensures devDependencies (like vite) are installed during build
  SAST_STAGE: "security"

# =========================
# DEFAULT - DOCKER RUNNER
# =========================
default:
  image: node:20-slim
  tags:
    - docker
  before_script:
    - set -e
  cache:
    key: npm-cache-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/npm/

# =========================
# SETUP
# =========================
setup-dependencies:
  stage: setup
  script:
    - echo "📦 Installing Node.js dependencies..."
    - node --version
    - npm --version
    - npm ci --prefer-offline --cache "$NPM_CACHE_DIR"
  cache:
    key: npm-cache-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/npm/
    policy: pull-push
  artifacts:
    paths:
      - package-lock.json
    expire_in: 1 hour

# NOTE:
# ----
# Các job security (SAST, secret_detection, dependency_scanning) được chèn tự động
# từ 3 template include ở trên. Bạn KHÔNG CẦN định nghĩa lại semgrep/eslint/npm-audit/snyk.
# Nếu muốn override một job template, định nghĩa job cùng tên sau include.

# =========================
# TEST & BUILD
# =========================
npm-audit:
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "🔍 Running npm audit..."
    - npm audit --json --audit-level=moderate > npm-audit-report.json || true
  artifacts:
    paths:
      - npm-audit-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

eslint:
  stage: security
  needs: [setup-dependencies]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "📋 Running ESLint..."
    - npx eslint src/ lib/ middleware/ routes/ utils/ --ext .js,.ts --format json --output-file eslint-report.json || true
  artifacts:
    paths:
      - eslint-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

tests:
  stage: test
  needs: [setup-dependencies]
  script:
    - echo "🧪 Running tests..."
    - npm test || echo "⚠️ Tests failed or not configured"
  allow_failure: true

build:
  stage: build
  needs: [setup-dependencies]
  script:
    - echo "🔨 Building app..."
    - node --version
    - npm --version
    - npm ci --prefer-offline --cache "$NPM_CACHE_DIR" --include=dev
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
    when: on_success

# =========================
# 🚀 DEPLOY TO SERVER (giữ nguyên)
# =========================
deploy:
  stage: deploy
  tags:
    - ubuntu-latest-shell
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  needs:
    - job: build
  before_script:
    - set -e
    - echo "🚀 Starting deployment to production..."
  script:
    - cd "$DEPLOY_PATH"
    - git config --global --add safe.directory "$DEPLOY_PATH"
    - git remote set-url origin "$GIT_ORIGIN" || git remote add origin "$GIT_ORIGIN"
    - git fetch origin
    - git reset --hard origin/$CI_DEFAULT_BRANCH
    - pm2 stop tennis || true
    - npm install --production=false
    - npm run build
    - pm2 delete tennis || true
    - pm2 start server.js --name tennis --env production
    - pm2 save
  environment:
    name: production
    url: https://hungsanity.com/tennis
    on_stop: stop-production

stop-production:
  stage: deploy
  tags:
    - ubuntu-latest-shell
  rules:
    - when: manual
  script:
    - cd "$DEPLOY_PATH" || true
    - pm2 stop tennis || true
    - pm2 delete tennis || true
  environment:
    name: production
    action: stop

# =========================
# 🔄 ROLLBACK (Manual trigger)
# =========================
rollback:
  stage: deploy
  tags:
    - ubuntu-latest-shell
  rules:
    - when: manual
      allow_failure: true
  allow_failure:
    exit_codes:
      - 99
  
  script:
    - cd "$DEPLOY_PATH"
    - echo "⏪ Rolling back to previous commit..."
    - echo "🔧 Configuring git safe directory..."
    - git config --global --add safe.directory "$DEPLOY_PATH"
    - git reset --hard HEAD~1
    - pm2 stop tennis || true
    - npm install --production=false
    - npm run build
    - pm2 delete tennis || true
    - pm2 start server.js --name tennis --env production
    - pm2 save
    - echo "⚠️ Rollback completed - Pipeline marked as warning"
    - exit 99

  environment:
    name: production
