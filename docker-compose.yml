version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tennis-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tennis_ranking}
      POSTGRES_USER: ${DB_USER:-tennis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tennis_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
      - ./data/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tennis_user} -d ${DB_NAME:-tennis_ranking}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: tennis-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network

networks:
  tennis-network:
    driver: bridge
