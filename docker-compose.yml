services:
  # ── Node.js Application (PM2 cluster inside container) ───────────────────────
  app:
    build: .
    container_name: tennis-app
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_HOST: postgres                 # override to use Docker internal DNS
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - tennis-network

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tennis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-tennis_ranking}
      POSTGRES_USER: ${DB_USER:-tennis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tennis_password}
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
      - ./data/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tennis_user} -d ${DB_NAME:-tennis_ranking}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tennis-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network

networks:
  tennis-network:
    driver: bridge

volumes:
  redis-data:
